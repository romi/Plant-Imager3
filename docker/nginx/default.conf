server {
    listen 80;
    server_name ${SERVER_URL};

    # Test endpoint that returns a simple message with content-type header set to text/plain
    location /test {
        return 200 'Nginx proxy is working!';
        add_header Content-Type text/plain;
    }

    # Proxy requests to the plantdb service running on localhost:5000
    location /plantdb {
        proxy_pass http://localhost:5000;

        # Forward necessary headers for proper request handling by the proxied server
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy requests to the webui service running on controller_url.com:8080
    location /webui {
        proxy_pass http://${CONTROLLER_URL}:${CONTROLLER_PORT};

        # Forward necessary headers for proper request handling by the proxied server
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}