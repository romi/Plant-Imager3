# Map for WebSocket connection header (must be at http-level or top of file included in http)
map $http_upgrade $connection_upgrade {
    default close;
    upgrade upgrade;
}

server {
    # Redirect HTTP to HTTPS (avoid trusting user-controlled Host)
    listen 80;
    listen [::]:80;
    server_name ${SERVER_URL};
    return 301 https://$server_name$request_uri;
}

server {
    # HTTPS server configuration
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${SERVER_URL};

    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # SSL certificate configuration
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # SSL optimization settings
    # Restricts the allowed protocols to only TLS 1.2 and 1.3 (most secure versions).
    ssl_protocols TLSv1.2 TLSv1.3;
    # Prefer the server's cipher suite order over the client's
    ssl_prefer_server_ciphers on;
    # Specifies a strong set of modern cipher suites that provide forward secrecy
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    # Optimize performance by caching SSL session parameters, reducing the need for full SSL handshakes on repeat visits
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    # Disable session tickets (unless you rotate/manage keys)
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'self';" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Test endpoint that returns a simple message with content-type header set to text/plain
    location /test {
        return 200 'Nginx proxy is working!';
        add_header Content-Type text/plain;
    }

    # Proxy requests to the 'plant-3d-explorer' service (drops /p3dx prefix)
    location /p3dx {
        # Forward requests with path '/p3dx' to the P3DX service
        # (URL and port replaced by `envsubst` when building docker image)
        proxy_pass http://${P3DX_URL}:${P3DX_PORT};

        # Forward necessary headers for proper request handling by the proxied server
        proxy_set_header Host $http_host;                             # Pass original host header (incl. port if present)
        proxy_set_header X-Forwarded-Host $host;                      # Inform backend of the original host requested
        proxy_set_header X-Real-IP $remote_addr;                      # Pass client's real IP address
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Append client IP to forwarding chain
        proxy_set_header X-Forwarded-Proto $scheme;                   # Pass original protocol (http/https)
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy requests to the 'plant-3d-vision webterm' service (WebSockets enabled; drops /p3dv prefix)
    location /p3dv {
        # Forward requests with path '/p3dv' to the P3DV WebTerm service
        # (URL and port replaced by `envsubst` when building docker image)
        proxy_pass http://${P3DV_URL}:${P3DV_PORT};

        # WebSocket/SSE requirements
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;

        # Forward necessary headers for proper request handling by the proxied server
        proxy_set_header Host $http_host;                             # Pass original host header (incl. port if present)
        proxy_set_header X-Forwarded-Host $host;                      # Inform backend of the original host requested
        proxy_set_header X-Real-IP $remote_addr;                      # Pass client's real IP address
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Append client IP to forwarding chain
        proxy_set_header X-Forwarded-Proto $scheme;                   # Pass original protocol (http/https)
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts suitable for interactive/websocket workloads
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 1h;
    }

    # Handle static files for p3dv
    location /p3dv/static {
        proxy_pass http://${P3DV_URL}:${P3DV_PORT}/static;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        # Cache static files for better performance
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Proxy requests to the 'plantdb' service (drops /plantdb prefix)
    location /plantdb {
        # Forward requests with path '/plantdb' to the PlantDB REST API service
        # (URL and port replaced by `envsubst` when building docker image)
        proxy_pass http://${PLANTDB_URL}:${PLANTDB_PORT};

        # Forward necessary headers for proper request handling by the proxied server
        proxy_set_header Host $http_host;                             # Pass original host header (incl. port if present)
        proxy_set_header X-Forwarded-Host $host;                      # Inform backend of the original host requested
        proxy_set_header X-Real-IP $remote_addr;                      # Pass client's real IP address
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Append client IP to forwarding chain
        proxy_set_header X-Forwarded-Proto $scheme;                   # Pass original protocol (http/https)
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy requests to the 'webui' service (drops /webui prefix)
    location /webui {
        # Forward requests with path '/webui' to the WebUI service
        # (URL and port replaced by `envsubst` when building docker image)
        proxy_pass http://${CONTROLLER_URL}:${CONTROLLER_PORT};

        # Forward necessary headers for proper request handling by the proxied server
        proxy_set_header Host $http_host;                             # Pass original host header (incl. port if present)
        proxy_set_header X-Forwarded-Host $host;                      # Inform backend of the original host requested
        proxy_set_header X-Real-IP $remote_addr;                      # Pass client's real IP address
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Append client IP to forwarding chain
        proxy_set_header X-Forwarded-Proto $scheme;                   # Pass original protocol (http/https)
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}