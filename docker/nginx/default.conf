# Reverse Proxy Config
# Host: mellitus.biologie.ens-lyon.fr
#--------------------------------------------

server {
    # Redirect HTTP to HTTPS (avoid trusting user-controlled Host)
    listen 80;
    listen [::]:80;
    server_name ${SERVER_HOST};
    return 301 https://$host$request_uri;
}

server {
    # HTTPS server configuration
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${SERVER_HOST};

    # SSL certificate configuration
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # SSL optimization settings
    # Restricts the allowed protocols to only TLS 1.2 and 1.3 (most secure versions).
    ssl_protocols TLSv1.2 TLSv1.3;
    # Prefer the server's cipher suite order over the client's
    ssl_prefer_server_ciphers on;
    # Specifies a strong set of modern cipher suites that provide forward secrecy
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    # Optimize performance by caching SSL session parameters, reducing the need for full SSL handshakes on repeat visits
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    # Disable session tickets (unless you rotate/manage keys)
    ssl_session_tickets off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;
    gzip_comp_level 5;
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Tell the browser that your website does not allow the use of geolocation, microphone, or camera APIs, regardless of the context or origin
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Test endpoint that returns a simple message with content-type header set to text/plain
    location /test {
        return 200 'Nginx proxy is working!';
        add_header Content-Type text/plain;
    }

    # Proxy requests to the 'plant-3d-explorer' service
    location ${P3DX_PREFIX} {
        # Forward requests with this prefix to the P3DX service
        # (URL and port replaced by `envsubst` when building docker image)
        proxy_pass http://${P3DX_HOST}:${P3DX_PORT};

        # Forward necessary headers for proper request handling by the proxied server
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy requests to the 'plant-3d-vision webterm' service
    location ${P3DV_PREFIX}/ {
        # Forward requests with this prefix to the P3DV WebTerm service
        # (URL, port & prefix replaced by `envsubst` when building docker image)
        proxy_pass http://${P3DV_HOST}:${P3DV_PORT}${P3DV_PREFIX}/;

        # Forward necessary headers for proper request handling by the proxied server
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts suitable for interactive/websocket workloads
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 1h;
    }

    # Handle Socket.IO requests
    location /socket.io/ {
        # Forward requests with this prefix to the P3DV WebTerm service
        # (URL & port replaced by `envsubst` when building docker image)
        proxy_pass http://${P3DV_HOST}:${P3DV_PORT}/socket.io/;

        # WebSocket headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts suitable for websocket workloads
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 1h;
    }

    # Proxy requests to the 'plantdb' service
    location ${PLANTDB_PREFIX} {
        # Forward requests with this prefix to the PlantDB REST API service
        # (URL, port & prefix replaced by `envsubst` when building docker image)
        proxy_pass http://${PLANTDB_HOST}:${PLANTDB_PORT};

        # Forward necessary headers for proper request handling by the proxied server
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy requests to the 'webui' service
    location ${CONTROLLER_PREFIX} {
        # Forward requests with this prefix to the WebUI service
        # (URL, port & prefix replaced by `envsubst` when building docker image)
        proxy_pass http://${CONTROLLER_HOST}:${CONTROLLER_PORT};

        # Forward necessary headers for proper request handling by the proxied server
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}