bogus-priv
filterwin2k
localise-queries
expand-hosts
no-negcache
clear-on-reload
enable-dbus
all-servers

#no-resolv
#server=140.77.1.32
#server=8.8.8.8

# Read configuration generated by openresolv
resolv-file=/var/run/dnsmasq/dnsmasq-resolv.conf

#read-ethers # read /etc/ethers for static lease info
dhcp-authoritative # we're the only dhcp server on this network

interface=wlan0 # Listening interface
dhcp-range=10.10.10.10,10.10.10.40,255.255.255.0,24h # Pool of IP addresses served via DHCP
domain=wlan     # Local wireless DNS domain
address=/gw.wlan/10.10.10.1  # Alias for this router
#dhcp-option=option:dns-server,8.8.8.8 # Set DNS Server
dhcp-host=b8:27:eb:50:74:3f,10.10.10.2
dhcp-host=b8:27:eb:4c:ae:62,10.10.10.3
dhcp-host=e4:5f:01:0e:35:7c,10.10.10.1
